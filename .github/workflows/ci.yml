name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: churn_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: churn_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENAI_API_KEY: your_openai_key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load database schema
        run: psql "postgresql://postgres:postgres@localhost:5432/churn_db" -f sql/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Generate mock customer data
        run: python mock_data/gen_customers.py

      - name: Create empty MLflow experiment
        run: python -c "import mlflow; mlflow.create_experiment('customer-churn-predictor')"

      # Model-dependent tests are run locally only
      # CI only runs data and dashboard tests
      - name: Run tests
        id: pytest
        run: >
          pytest tests/ -v
          --ignore=tests/test_mlflow.py
          --ignore=tests/test_models.py
          --ignore=tests/test_ensemble.py
          --ignore=tests/test_api.py
          --ignore=tests/test_evaluation.py
          --ignore=tests/test_engineering.py
          --ignore=tests/test_batch_pipeline.py

      - name: Print test results
        if: always()
        run: |
          if [ "${{ steps.pytest.outcome }}" = "success" ]; then
            echo "All tests passed."
          else
            echo "Tests failed — see the 'Run tests' step above for details."
          fi
